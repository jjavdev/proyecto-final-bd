<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Decarrerita</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Sora:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .glass-morphism {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(45, 45, 45, 1);
        }

        .neon-glow {
            box-shadow: 0 0 20px rgba(61, 255, 163, 0.2);
        }

        .neon-glow-focus:focus-within {
            box-shadow: 0 0 15px rgba(61, 255, 163, 0.15);
            border-color: #3DFFA3 !important;
        }

        .grid-background {
            background-image: 
                linear-gradient(to right, rgba(61, 255, 163, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(61, 255, 163, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .scanline-effect::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 0%, rgba(61, 255, 163, 0.05) 50%, transparent 100%);
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        .kinetic-border {
            position: relative;
            overflow: hidden;
        }

        .kinetic-border::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #3DFFA3);
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
    </style>

                        "lg": "48px",

<body class="bg-background text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md">
<!-- High-Tech Background -->
<div class="fixed inset-0 grid-background opacity-20 z-0"></div>
<div class="fixed inset-0 scanline-effect z-0"></div>
<!-- Ambient Glow Orbs -->
<div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-primary-container/10 blur-[120px] rounded-full z-0"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container/5 blur-[100px] rounded-full z-0"></div>
<!-- Main Content Wrapper -->
<main class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Logo/Brand Anchor -->
<div class="flex flex-col items-center mb-lg">
<div class="mb-md p-sm bg-surface-container-high rounded-xl border border-outline-variant/30 flex items-center justify-center shadow-2xl">
<span class="material-symbols-outlined text-primary-fixed-dim !text-4xl" data-icon="speed">speed</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-primary-fixed-dim tracking-tighter italic font-black uppercase">
                Decarrerita
            </h1>
<p class="text-on-surface-variant font-body-md tracking-wider mt-xs uppercase text-xs">Elite Mobility Solutions</p>
</div>
<!-- Login Card -->
<section class="glass-morphism rounded-[24px] p-md md:p-lg neon-glow relative">
<!-- Decorative corner accent -->
<div class="absolute top-0 right-0 w-12 h-12 border-t-2 border-r-2 border-primary-fixed-dim/40 rounded-tr-[24px]"></div>
<header class="mb-md">
<h2 class="font-headline-md text-headline-md text-on-surface">Welcome Back</h2>
<p class="text-on-surface-variant font-body-md">Enter your credentials to access the cockpit.</p>
</header>
<form action="#" class="space-y-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-xs group">
<label class="text-label-md font-label-md text-on-surface-variant group-focus-within:text-primary-fixed-dim transition-colors" for="email">
                        EMAIL ADDRESS
                    </label>
<div class="relative neon-glow-focus rounded-lg transition-all duration-300">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface pl-12 pr-4 py-4 rounded-lg focus:outline-none focus:ring-0 transition-all font-body-md placeholder:text-on-surface-variant/30" id="email" placeholder="pilot@decarrerita.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs group">
<div class="flex justify-between items-center">
<label class="text-label-md font-label-md text-on-surface-variant group-focus-within:text-primary-fixed-dim transition-colors" for="password">
                            PASSWORD
                        </label>
<a class="text-[12px] text-primary-fixed-dim/60 hover:text-primary-fixed-dim transition-colors uppercase font-bold tracking-tight" href="#">Forgot Key?</a>
</div>
<div class="relative neon-glow-focus rounded-lg transition-all duration-300">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface pl-12 pr-12 py-4 rounded-lg focus:outline-none focus:ring-0 transition-all font-body-md placeholder:text-on-surface-variant/30" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined !text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-sm">
<input class="w-5 h-5 rounded border-outline-variant bg-surface-container-lowest text-primary-fixed-dim focus:ring-primary-fixed-dim/20" id="remember" type="checkbox"/>
<label class="text-label-md text-on-surface-variant select-none" for="remember">Remember this station</label>
</div>
<!-- Primary Action -->
<div class="pt-sm">
<button class="w-full bg-primary-container text-on-primary font-bold py-4 rounded-lg flex items-center justify-center space-x-sm hover:brightness-110 active:scale-[0.98] transition-all duration-200 shadow-[0_0_20px_rgba(61,255,163,0.3)] group" type="submit">
<span class="font-headline-md tracking-tight">AUTHENTICATE</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Social Login Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant/30"></span>
</div>
<div class="relative flex justify-center text-xs">
<span class="px-md bg-[#1A1A1A] text-on-surface-variant uppercase font-bold tracking-widest">or initialize with</span>
</div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center py-sm px-md rounded-lg border border-outline-variant/50 hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined mr-sm text-on-surface-variant group-hover:text-primary-fixed-dim" data-icon="google">google</span>
<span class="text-label-md text-on-surface-variant">Google</span>
</button>
<button class="flex items-center justify-center py-sm px-md rounded-lg border border-outline-variant/50 hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined mr-sm text-on-surface-variant group-hover:text-primary-fixed-dim" data-icon="apple">apps</span>
<span class="text-label-md text-on-surface-variant">Apple</span>
</button>
</div>
</section>
<!-- Footer Actions -->
<footer class="mt-md text-center">
<p class="text-on-surface-variant font-body-md">
                Don't have an operator profile? 
                <a class="text-primary-fixed-dim font-bold underline underline-offset-4 decoration-primary-fixed-dim/30 hover:decoration-primary-fixed-dim transition-all ml-1" href="#">
                    Register Now
                </a>
</p>
</footer>

</div>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginCard = document.querySelector('.glass-morphism');
            
            // Subtle tilt effect on card
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                loginCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            // Focus interactions for inputs
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.classList.add('neon-glow');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.classList.remove('neon-glow');
                });
            });
        });
    </script>
</body></html>
